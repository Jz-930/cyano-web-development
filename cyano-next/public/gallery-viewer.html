<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <title>Cyano Gallery</title>
  <style>
    :root {
      color-scheme: dark;
      background: #030607;
      color: #f4fbfb;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #030607;
    }

    body {
      padding: max(14px, env(safe-area-inset-top)) 0 max(18px, env(safe-area-inset-bottom));
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .viewer-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 12px 14px;
    }

    .viewer-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .viewer-button {
      display: inline-flex;
      min-height: 40px;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: #111817;
      padding: 0 14px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
      line-height: 1;
      white-space: nowrap;
    }

    .viewer-count {
      color: rgba(255, 255, 255, 0.54);
      font-size: 13px;
      white-space: nowrap;
    }

    .viewer-image {
      display: block;
      width: 100%;
      height: auto;
      margin: 0;
      border: 0;
      background: #030607;
    }

    .viewer-footer {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px 12px 0;
    }

    .viewer-footer .viewer-button {
      border-radius: 14px;
    }
  </style>
</head>
<body>
  <nav class="viewer-bar" aria-label="Gallery controls">
    <a id="back" class="viewer-button" href="/cases">Back</a>
    <span id="count" class="viewer-count">1 / 1</span>
    <div class="viewer-actions">
      <a id="original" class="viewer-button" href="/" target="_blank" rel="noreferrer">Original</a>
    </div>
  </nav>

  <main>
    <img id="image" class="viewer-image" alt="">
  </main>

  <nav class="viewer-footer" aria-label="Gallery navigation">
    <a id="previous" class="viewer-button" href="#">Previous</a>
    <a id="next" class="viewer-button" href="#">Next</a>
  </nav>

  <script>
    (function () {
      var galleries = [
        [
          "/media/lnpe-sales-ai/lnpe-sales-consultant-01-public-assistant.webp",
          "/media/lnpe-sales-ai/lnpe-sales-consultant-02-access-portal.webp",
          "/media/lnpe-sales-ai/lnpe-sales-consultant-03-project-match.webp",
          "/media/lnpe-sales-ai/lnpe-sales-consultant-04-price-reference.webp"
        ],
        [
          "/media/huisheng-proposal-ai/huisheng-proposal-ai-01-workflow-draft.webp",
          "/media/huisheng-proposal-ai/huisheng-proposal-ai-02-start-draft.webp"
        ],
        [
          "/media/alpha-house-ai/alpha-house-02-messages.webp",
          "/media/alpha-house-ai/alpha-house-03-work-order-chat.webp",
          "/media/alpha-house-ai/alpha-house-04-finance.webp",
          "/media/alpha-house-ai/alpha-house-05-contacts.webp",
          "/media/alpha-house-ai/alpha-house-06-reports.webp",
          "/media/alpha-house-ai/alpha-house-01-login.webp"
        ],
        [
          "/media/enterprise-wiki-ai/enterprise-wiki-it-assistant-01-dashboard.webp",
          "/media/enterprise-wiki-ai/enterprise-wiki-it-assistant-02-articles.webp",
          "/media/enterprise-wiki-ai/enterprise-wiki-it-assistant-03-article-detail.webp",
          "/media/enterprise-wiki-ai/enterprise-wiki-it-assistant-04-ticket-detail.webp",
          "/media/enterprise-wiki-ai/enterprise-wiki-it-assistant-05-analytics.webp"
        ],
        [
          "/media/smartdoc-ui-suite/smartdoc-ui-suite-01-dashboard-overview.webp",
          "/media/smartdoc-ui-suite/smartdoc-ui-suite-02-sql-control-center.webp",
          "/media/smartdoc-ui-suite/smartdoc-ui-suite-03-knowledge-base.webp",
          "/media/smartdoc-ui-suite/smartdoc-ui-suite-04-proposal-builder.webp",
          "/media/smartdoc-ui-suite/smartdoc-ui-suite-05-review-audit.webp",
          "/media/smartdoc-ui-suite/smartdoc-ui-suite-06-template-library.webp"
        ],
        [
          "/media/dme-writing-engine/dme-writing-engine-01-chat-branch-switch.webp",
          "/media/dme-writing-engine/dme-writing-engine-02-chat-memory-drawer.webp",
          "/media/dme-writing-engine/dme-writing-engine-03-context-memory-stats.webp",
          "/media/dme-writing-engine/dme-writing-engine-04-note-editor-ai-panel.webp",
          "/media/dme-writing-engine/dme-writing-engine-05-fragments-library-bulk.webp",
          "/media/dme-writing-engine/dme-writing-engine-06-archive-pack-inspect.webp",
          "/media/dme-writing-engine/dme-writing-engine-07-connections-settings.webp",
          "/media/dme-writing-engine/dme-writing-engine-00-startup-loading.webp"
        ]
      ];

      var params = new URLSearchParams(window.location.search);
      var caseIndex = Number(params.get("case"));
      var photoIndex = Number(params.get("photo"));

      if (!Number.isFinite(caseIndex) || caseIndex < 0 || caseIndex >= galleries.length) {
        caseIndex = 0;
      }

      var gallery = galleries[caseIndex];

      if (!Number.isFinite(photoIndex) || photoIndex < 0 || photoIndex >= gallery.length) {
        photoIndex = 0;
      }

      var back = params.get("back") || "/cases";
      var src = gallery[photoIndex];
      var previousIndex = (photoIndex - 1 + gallery.length) % gallery.length;
      var nextIndex = (photoIndex + 1) % gallery.length;

      function viewerHref(targetPhotoIndex) {
        var nextParams = new URLSearchParams({
          case: String(caseIndex),
          photo: String(targetPhotoIndex),
          back: back
        });

        return "/gallery-viewer?" + nextParams.toString();
      }

      document.title = "Cyano Gallery " + (photoIndex + 1) + " / " + gallery.length;
      document.getElementById("back").href = back;
      document.getElementById("count").textContent = (photoIndex + 1) + " / " + gallery.length;
      document.getElementById("original").href = src;
      document.getElementById("previous").href = viewerHref(previousIndex);
      document.getElementById("next").href = viewerHref(nextIndex);

      var image = document.getElementById("image");
      image.src = src;
      image.alt = "Cyano project screenshot " + (photoIndex + 1);
    }());
  </script>
</body>
</html>
